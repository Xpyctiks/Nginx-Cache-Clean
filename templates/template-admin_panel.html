<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="">
    <title>Nginx cache manager</title>
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.ico') }}" sizes="48x48">
    <link rel="icon" href="{{ url_for('static', filename='images/favicon.svg') }}" type="image/svg+xml">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='images/apple-touch-icon.png') }}">
    <link rel="manifest" href="{{ url_for('static', filename='images/site.webmanifest') }}">
    <link href="{{ url_for('static', filename='css/bootstrap.min.css') }}" rel="stylesheet" crossorigin="anonymous">
    <script src="{{ url_for('static', filename='js/bootstrap.bundle.min.js') }}" crossorigin="anonymous" defer></script>
    <link href="{{ url_for('static', filename='css/admin_panel.css') }}" rel="stylesheet">
</head>
<body>
<main>
<div>
  <nav class="navbar navbar-expand-md navbar-dark fixed-top bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="/">⬅Nginx cache manager</a>
      <span class="spinner-border text-warning ms-2" role="status" id="spinnerLoading"></span>
      <div class="ms-auto d-flex align-items-center">
        <form class="d-flex" action="/logout/" method="POST">
          <button class="btn btn-outline-warning" type="submit" name="logout">{{current_user.realname}}&nbsp;Вихід</button>
        </form>
      </div>
    </div>
  </nav>
</div>
<ul class="nav nav-tabs">
  <li class="nav-item"><a class="nav-link {{active1|safe}}" href="/admin_panel/settings/">Налаштування</a></li>
  <li class="nav-item"><a class="nav-link {{active2|safe}}" href="/admin_panel/users/">Користувачі</a></li>
</ul>
<br>
{{data|safe}}
<script src="{{ url_for('static', filename='js/admin_panel.js') }}" defer></script>
</main>
{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
<ul class="flashes" id="message">
{% for category, message in messages %}
    <li class="{{ category }}">{{ message }}</li>
{% endfor %}
</ul>
{% endif %}
{% endwith %}
</body>
</html>
